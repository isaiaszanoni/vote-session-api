version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vote-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vote_session_api
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vote-network

  app:
    build: .
    container_name: vote-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_SCHEMA: vote_session_api
      DB_USER: root
      DB_PASS: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vote-network

networks:
  vote-network:
    driver: bridge

volumes:
  mysql-data: